# Frontend service uses Dockerfile.dev + a bind mount so source edits show up without rebuilding.
# Run `make prepare-speaker-model` once so ./services/whisperx/models/speaker_role/distilbert exists
# for WhisperX and backend SPEAKER_ROLE_MODEL_DIR mounts.

services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:17
    container_name: vocalmind-db
    restart: unless-stopped
    cpus: 1.0
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: vocalmind
      POSTGRES_USER: vocalmind
      POSTGRES_PASSWORD: vocalmind_dev
    volumes:
      - vocalmind_data:/var/lib/postgresql/data
      - ./infra/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vocalmind" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vocalmind-backend
    env_file:
      - ./backend/.env
    cpus: 2.0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://vocalmind:vocalmind_dev@db:5432/vocalmind
      - SECRET_KEY=${SECRET_KEY:-vocalmind_local_dev_secret_change_in_env}
      - IS_LOCAL=true
      - EMOTION_API_URL=http://emotion:8000
      - VAD_API_URL=http://vad:8002
      - WHISPERX_API_URL=http://whisperx:8000
      - FRONTEND_URL=http://localhost:3000
      - LOCAL_AUDIO_STORAGE_DIR=/app/storage/uploads
      # LLM / Groq
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.0}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-1024}
      # Manager assistant: force local Ollama model
      - ASSISTANT_LLM_PROVIDER=ollama
      - ASSISTANT_OLLAMA_MODEL=qwen2.5:7b
      # RAG — point at Docker service names, not localhost
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_PARENTS=${QDRANT_COLLECTION_PARENTS:-vocalmind_parents}
      - QDRANT_COLLECTION_SOP_PARENTS=${QDRANT_COLLECTION_SOP_PARENTS:-vocalmind_sop_parents}
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-snowflake-arctic-embed2}
      - SOP_RETRIEVAL_TOP_K=${SOP_RETRIEVAL_TOP_K:-3}
      # Text emotion
      - TEXT_EMOTION_PROVIDER=${TEXT_EMOTION_PROVIDER:-hf_transformers}
      - TEXT_EMOTION_MODEL=${TEXT_EMOTION_MODEL:-j-hartmann/emotion-english-distilroberta-base}
      # Keep backend relabeling disabled to avoid double speaker-role assignment.
      - SPEAKER_ROLE_MODEL_DIR=/app/models/speaker_role/distilbert
      - BACKEND_SPEAKER_RELABEL_ENABLED=false
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./storage:/app/storage
      # Mount services/rag so backend can `from rag.evaluator import PolicyComplianceEvaluator`
      # and `from rag.query_engine import RAGQueryEngine` without a separate package install.
      - ./services/rag:/app/rag:ro
      - ./services/whisperx/models/speaker_role/distilbert:/app/models/speaker_role/distilbert:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: vocalmind-frontend
    cpus: 1.0
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - vocalmind_frontend_node_modules:/app/node_modules
    command: ["sh", "-c", "if [ ! -f node_modules/.bin/vite ]; then pnpm install; fi && pnpm run dev"]
    restart: unless-stopped

  # ── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.3.4
    container_name: vocalmind-ollama
    cpus: 4.0
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ── Qdrant ──────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.1
    container_name: vocalmind-qdrant
    cpus: 1.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Ingestion Pipeline ─────────────────────────────────────────────────────
  ingestion:
    build:
      context: ./services/rag
      dockerfile: Dockerfile
    container_name: vocalmind-ingestion
    cpus: 2.0
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_MODEL=snowflake-arctic-embed2
      - DOCS_DIR=/app/storage/docs
      - POLICY_DOCS_DIR=/app/storage/docs
      - KNOWLEDGE_DOCS_DIR=/app/storage/docs
      - PARSED_POLICY_DIR=/app/storage/docs
      - PARSED_SOP_DIR=/app/storage/docs
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    restart: unless-stopped

  # ── VAD Preprocessing ──────────────────────────────────────────────────────
  vad:
    build:
      context: ./services/vad
    container_name: vocalmind-vad
    cpus: 2.0
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Emotion Recognition ────────────────────────────────────────────────────
  emotion:
    build:
      context: ./services/emotion
    container_name: vocalmind-emotion
    cpus: 2.0
    ports:
      - "8001:8000"
    volumes:
      - ./services/emotion/app.py:/app/app.py
      - emotion_cache:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── WhisperX ASR ───────────────────────────────────────────────────────────
  whisperx:
    build:
      context: ./services/whisperx
      dockerfile: Dockerfile
    image: grad-whisperx:latest
    container_name: vocalmind-whisperx
    cpus: 4.0
    ports:
      - "8003:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - WHISPER_MODEL_SIZE=tiny
      - SPEAKER_ROLE_MODEL_ENABLED=${SPEAKER_ROLE_MODEL_ENABLED:-true}
      - SPEAKER_ROLE_MODEL_DIR=/app/models/speaker_role/distilbert
      # Stereo / split-channel telephony: bypass PyAnnote, assign by channel energy.
      # Mono and mono-duplicated audio fall through to the standard cluster path.
      - CHANNEL_DIARIZATION_ENABLED=${CHANNEL_DIARIZATION_ENABLED:-true}
      - CHANNEL_DIARIZATION_MAX_CORR=${CHANNEL_DIARIZATION_MAX_CORR:-0.92}
      # Optional: pin agent channel ("0" or "1"). Unset = pick by first-window
      # energy. Set explicitly for fixed-convention PBX/SBC deployments.
      - AGENT_CHANNEL=${AGENT_CHANNEL:-}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./services/whisperx/app.py:/app/app.py
      - ./services/whisperx/speaker_role_classifier.py:/app/speaker_role_classifier.py
      - ./services/whisperx/models/speaker_role/distilbert:/app/models/speaker_role/distilbert:ro
      # Persist HF + torch hub model caches across container recreations.
      # Without this, every recreate re-downloads faster-whisper-large-v3
      # (~3GB), wav2vec2 alignment (~360MB), and pyannote diarization (~100MB).
      - whisperx_cache:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 300s
    restart: unless-stopped

volumes:
  vocalmind_data:
  ollama_data:
  qdrant_data:
  vocalmind_frontend_node_modules:
  whisperx_cache:
  emotion_cache:
