name: Backend CI

on:
  push:
    branches: ['**']
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  backend:
    name: 📦 Backend Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Install dependencies
        run: uv sync

      - name: Lint (Ruff)
        run: uv run ruff check . --output-format=github

      - name: Test (pytest)
        run: uv run pytest tests/ -v --tb=short

      - name: Quality Benchmarks
        run: python ../infra/scripts/eval/eval_all.py

      - name: Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-benchmark-reports
          path: infra/benchmarks/reports/*.json
          if-no-files-found: warn

      - name: License Audit
        run: |
          uv run pip-licenses --format=markdown >> $GITHUB_STEP_SUMMARY
          if uv run pip-licenses --format=csv | grep -qiE "GPL|LGPL|AGPL" ; then
            echo "::error::Copyleft license detected!"
            exit 1
          fi
